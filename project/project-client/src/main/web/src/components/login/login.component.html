<div class="login-container">
    <h3>{{'login.main-text' | translate}}</h3>
    <mat-form-field class="login-text-input" appearance="outline">
        <mat-label>{{'login.email' | translate}}</mat-label>
        <input matInput type="email" placeholder="{{'login.email-placeholder' | translate}}">
    </mat-form-field>
    <mat-form-field class="login-text-input" appearance="outline">
        <mat-label>{{'login.password' | translate}}</mat-label>
        <input matInput type="password" placeholder="{{'login.password-placeholder' | translate}}">
    </mat-form-field>
    <mat-checkbox>{{'login.remember-me' | translate}}</mat-checkbox>
    <div class="login-buttons">
        <button class="login-button" mat-raised-button color="primary">{{'login.sign-in' | translate}}</button>
    </div>
</div>
