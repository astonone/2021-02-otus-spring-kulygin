<div class="sign-up text-center">
    <main class="form-signin">
        <form>
            <h1 class="h3 mb-3 fw-normal">{{'sign-up.main-text' | translate}}</h1>

            <div class="form-floating">
                <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                <label for="floatingInput">{{'sign-up.email' | translate}}</label>
            </div>
            <div class="form-floating">
                <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
                <label for="floatingPassword">{{'sign-up.password' | translate}}</label>
            </div>
            <div class="form-floating">
                <input type="password" class="form-control" id="floatingPasswordRepeat" placeholder="PasswordRepeat">
                <label for="floatingPassword">{{'sign-up.password-repeat' | translate}}</label>
            </div>
            <div class="form-floating">
                <input type="text" class="form-control" id="floatingInputFirstName" placeholder="John">
                <label for="floatingInput">{{'sign-up.firstname' | translate}}</label>
            </div>
            <div class="form-floating">
                <input type="text" class="form-control" id="floatingInputLastName" placeholder="Smith">
                <label for="floatingInput">{{'sign-up.lastname' | translate}}</label>
            </div>

            <button class="btn-sign-up w-100 btn btn-lg btn-primary"
                    type="submit">{{'sign-up.sign-up' | translate}}</button>
        </form>
    </main>
</div>
